services:
  server:
    build:
      context: .
      target: app
    image: text_adventures-server:${TEXT_ADVENTURES_ASSET_VERSION:-latest}
    environment:
      TEXT_ADVENTURES_HOST: 0.0.0.0
      TEXT_ADVENTURES_PORT: 4567
      TEXT_ADVENTURES_MAX_CONNECTIONS: ${TEXT_ADVENTURES_MAX_CONNECTIONS:-50}
      TEXT_ADVENTURES_MAX_SESSIONS: ${TEXT_ADVENTURES_MAX_SESSIONS:-100}
      TEXT_ADVENTURES_SESSION_TTL_SECONDS: ${TEXT_ADVENTURES_SESSION_TTL_SECONDS:-1800}
      TEXT_ADVENTURES_READ_TIMEOUT_SECONDS: ${TEXT_ADVENTURES_READ_TIMEOUT_SECONDS:-5}
      TEXT_ADVENTURES_WEBSOCKET_IDLE_TIMEOUT_SECONDS: ${TEXT_ADVENTURES_WEBSOCKET_IDLE_TIMEOUT_SECONDS:-60}
      TEXT_ADVENTURES_SAVE_DIR: /text_adventures/storage/games
      TEXT_ADVENTURES_SAVE_HISTORY_LIMIT: ${TEXT_ADVENTURES_SAVE_HISTORY_LIMIT:-1}
    volumes:
      - ./bin:/text_adventures/bin:ro
      - ./data:/text_adventures/data:ro
      - ./frontend:/text_adventures/frontend:ro
      - ./lib:/text_adventures/lib:ro
      - ./spec:/text_adventures/spec:ro
      - ./Rakefile:/text_adventures/Rakefile:ro
      - ./storage/games:/text_adventures/storage/games

  web:
    build:
      context: .
      target: web
    image: text_adventures-web:${TEXT_ADVENTURES_ASSET_VERSION:-latest}
    depends_on:
      server:
        condition: service_healthy
    networks:
      default:
        aliases:
          - text-adventures
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
